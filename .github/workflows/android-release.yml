# GitHub Actions CI/CD Workflow for LockIn Android Client
# Why: Automates running unit tests and compiling secure release builds (APK/AAB) on branch pushes.

name: Build & Test Android Release

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the git repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Initialize Java 17 environment (matching jvmToolchain)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Cache Gradle wrapper and packages to speed up future runs
      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Generate local.properties for sandbox key injection (Phase 1)
      - name: Create local.properties
        run: |
          echo "RAZORPAY_KEY_TEST=rzp_test_placeholder" > local.properties
          echo "RAZORPAY_KEY_LIVE=${{ secrets.RAZORPAY_KEY_LIVE }}" >> local.properties
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> local.properties

      # 4.5. Create google-services.json (Phase 1)
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123","project_id":"mock-id","storage_bucket":"mock.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.lockin.app"}},"oauth_client":[],"api_key":[{"current_key":"mock_key"}],"services":{}}]}' > app/google-services.json
          fi

      # 5. Execute all local JVM unit tests (Phase 21.1, 21.2)
      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest

      # 6. Verify and Decode signing keystore from Base64 secret
      - name: Decode Keystore File
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not configured. Please add it to your GitHub Repository Secrets."
            exit 1
          fi
          if [ -z "$KEY_STORE_PASSWORD" ]; then
            echo "::error::KEY_STORE_PASSWORD secret is not configured. Please add it to your GitHub Repository Secrets."
            exit 1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::KEY_ALIAS secret is not configured. Please add it to your GitHub Repository Secrets."
            exit 1
          fi
          if [ -z "$KEY_PASSWORD" ]; then
            echo "::error::KEY_PASSWORD secret is not configured. Please add it to your GitHub Repository Secrets."
            exit 1
          fi
          printf "%s" "$KEYSTORE_BASE64" | base64 --decode > app/release-key.jks

      # 7. Compile the release package (AAB bundle for Play Store upload)
      - name: Build Release Bundle
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release-key.jks \
            -Pandroid.injected.signing.store.password=$KEY_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # 8. Upload the signed App Bundle to GitHub Artifacts
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lockin-release-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 7

      # 9. Purge sensitive credentials from workspace runner
      - name: Clean up Credentials
        if: always()
        run: |
          rm -f app/release-key.jks
          rm -f local.properties
          rm -f app/google-services.json
